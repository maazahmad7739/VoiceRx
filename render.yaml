services:
  - type: web
    name: voicerx-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push && node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voicerx-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://frontend-xi-bice-42.vercel.app

databases:
  - name: voicerx-db
    plan: free
